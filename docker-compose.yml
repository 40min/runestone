services:
  postgres:
    image: postgres:16-alpine
    container_name: runestone-postgres
    command:
      - "postgres"
      - "-c"
      - "max_connections=${POSTGRES_MAX_CONNECTIONS:-50}"
      - "-c"
      - "shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}"
      - "-c"
      - "effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-384MB}"
      - "-c"
      - "maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-32MB}"
      - "-c"
      - "checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-15min}"
      - "-c"
      - "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-512MB}"
      - "-c"
      - "wal_compression=on"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - runestone-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: runestone-backend
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - VERBOSE=${VERBOSE}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - STARTUP_DB_CHECK=false
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-8}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-8}
      - DATABASE_POOL_TIMEOUT=${DATABASE_POOL_TIMEOUT:-30}
      - DATABASE_POOL_RECYCLE_SECONDS=${DATABASE_POOL_RECYCLE_SECONDS:-1800}
      - DATABASE_POOL_PRE_PING=${DATABASE_POOL_PRE_PING:-true}
    volumes:
      - ./res:/app/res:ro
      - ./state:/app/state
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - runestone-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  recall:
    build:
      context: .
      dockerfile: Dockerfile.recall
    container_name: runestone-recall
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - VERBOSE=${VERBOSE}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-8}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-8}
      - DATABASE_POOL_TIMEOUT=${DATABASE_POOL_TIMEOUT:-30}
      - DATABASE_POOL_RECYCLE_SECONDS=${DATABASE_POOL_RECYCLE_SECONDS:-1800}
      - DATABASE_POOL_PRE_PING=${DATABASE_POOL_PRE_PING:-true}
    volumes:
      - ./state:/app/state
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - runestone-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: runestone-frontend
    ports:
      - "3010:3010"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - runestone-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  runestone-network:
    driver: bridge

volumes:
  postgres_data:
