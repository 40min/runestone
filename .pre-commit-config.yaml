# Pre-commit configuration for Runestone.
# Run `make setup` to install hooks and `make security-check` for a full sweep.

default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: "3.0.0"
default_language_version:
  python: python3.13

exclude: |
  (?x)^(
    \.git/|
    \.uv-cache/|
    \.venv/|
    build/|
    dist/|
    htmlcov/|
    node_modules/|
    frontend/node_modules/|
    frontend/dist/|
    docs/assets/|
    frontend/src/assets/|
    res/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^frontend/tsconfig\.(app|node)\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: debug-statements

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.13
        args: ["--line-length=120", "--target-version=py313"]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length=120"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=120", "--extend-ignore=E203,W503"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml", "--redact"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit-sast
        files: ^src/runestone/.*\.py$
        args: ["-c", "pyproject.toml", "-ll", "-ii"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.17.0
    hooks:
      - id: eslint
        name: eslint-frontend
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]
        additional_dependencies:
          - eslint@^9.39.4
          - "@eslint/js@^9.39.4"
          - typescript-eslint@^8.61.0
          - eslint-plugin-react-hooks@^5.2.0
          - eslint-plugin-react-refresh@^0.4.26
          - globals@^16.5.0
        args:
          [
            "--config",
            "frontend/eslint.config.js",
            "--cache",
            "--cache-location",
            "frontend/.eslintcache",
          ]
      - id: eslint
        name: eslint-security
        stages: [manual]
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]
        additional_dependencies:
          - eslint@^9.39.4
          - "@eslint/js@^9.39.4"
          - typescript-eslint@^8.61.0
          - eslint-plugin-react-hooks@^5.2.0
          - eslint-plugin-react-refresh@^0.4.26
          - eslint-plugin-security@^3.0.1
          - globals@^16.5.0
        args:
          [
            "--config",
            "frontend/eslint.security.config.js",
            "--cache",
            "--cache-location",
            "frontend/.eslintcache-security",
          ]

  - repo: https://github.com/semgrep/pre-commit
    rev: v1.164.0
    hooks:
      - id: semgrep
        name: semgrep-sast
        files: ^(src/runestone/.*\.py|frontend/src/.*\.(ts|tsx))$
        exclude: ^(tests/|alembic/versions/|frontend/src/.*\.test\.(ts|tsx)$)
        pass_filenames: false
        args:
          [
            "--config",
            "p/python",
            "--config",
            "p/typescript",
            "--config",
            "p/react",
            "--config",
            "p/owasp-top-ten",
            "--error",
            "--skip-unknown-extensions",
            "--exclude",
            "tests",
            "--exclude",
            "alembic/versions",
            "--jobs",
            "0",
            "--metrics=off",
            "src/runestone",
            "frontend/src",
          ]

  - repo: local
    hooks:
      - id: safety
        name: safety-dependency-scan
        language: python
        entry: python scripts/run_safety_precommit.py
        additional_dependencies: ["safety==3.8.1"]
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock|requirements.*\.txt)$

      - id: frontend-lockfile-check
        name: frontend-lockfile-check
        language: python
        entry: python scripts/check_frontend_lockfile_sync.py
        pass_filenames: false
        files: ^(Dockerfile\.frontend|frontend/package(-lock)?\.json|scripts/check_frontend_lockfile_sync\.py)$
        stages: [pre-push]
